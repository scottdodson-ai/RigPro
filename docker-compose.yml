services:
  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: rigpro
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - rigpro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password123
      DB_NAME: rigpro
      JWT_SECRET: supersecretkey_for_rigpro
      OLLAMA_URL: http://ollama:11434
      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rigpro-network

  web:
    build: .
    command: sh -c "npm install && npm run dev -- --host --port 3000"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - rigpro-network

  ai:
    image: ghcr.io/ggml-org/llama.cpp:server
    ports:
      - "8080:8080"
    volumes:
      - /Users/peterlindsay/Documents/Projects/Rigpro_Data:/models
    command: -m /models/llama-3.1-8b-instruct-q4_k_m.gguf -ngl 99 --port 8080 --host 0.0.0.0 -c 8192 -np 1 -b 512 -ub 128 --flash-attn auto --cache-type-k q4_0 --cache-type-v q4_0
    networks:
      - rigpro-network

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rigpro-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rigpro-network
    restart: unless-stopped

networks:
  rigpro-network:
    driver: bridge

volumes:
  db_data:
  api_node_modules:
  web_node_modules:
  ollama_data:
  qdrant_data:
