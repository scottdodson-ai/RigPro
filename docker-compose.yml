services:
  db:
    image: mysql:8.0
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: rigpro
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - rigpro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password123
      DB_NAME: rigpro
      JWT_SECRET: supersecretkey_for_rigpro
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rigpro-network

  web:
    build: .
    command: sh -c "npm install && npm run dev -- --host --port 3000"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - rigpro-network

networks:
  rigpro-network:
    driver: bridge

volumes:
  db_data:
  api_node_modules:
  web_node_modules:
