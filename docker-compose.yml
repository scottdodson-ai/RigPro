services:
  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: rigpro
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql
    networks:
      - rigpro-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword123"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./server
    command: sh -c "npm install && npm start"
    ports:
      - "3001:3001"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: password123
      DB_NAME: rigpro
      JWT_SECRET: supersecretkey_for_rigpro
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: rigpro3mail@gmail.com
      SMTP_PASS: uapcibbmgkuifscw
#      OLLAMA_URL: http://ollama:11434
#      QDRANT_URL: http://qdrant:6333
    volumes:
      - ./server:/app
      - api_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - rigpro-network

  web:
    build: .
    command: sh -c "npm install && npm run dev -- --host --port 3000"
    ports:
      - "3000:3000"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    networks:
      - rigpro-network

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - rigpro-network

  ai:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles:
      - ai
    ports:
      - "8080:8080"
    volumes:
      - ${RIGPRO_MODEL_PATH:-./models}:/models
    command: ["sh", "-c", "echo 'AI service temporarily disabled (GGUF loading off)'; tail -f /dev/null"]
    networks:
      - rigpro-network

